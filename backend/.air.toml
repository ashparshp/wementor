root = "."
tmp_dir = "tmp"

[build]
  # This is the command Air runs to build your API
  cmd = "go build -o ./tmp/main ./cmd/api/main.go"
  # This is the binary Air will execute after building
  bin = "./tmp/main"
  # Delay before building (ms)
  delay = 1000
  # Ignore these directories to save CPU
  exclude_dir = ["assets", "tmp", "vendor", "docs"]
  # Watch these file extensions for changes
  include_ext = ["go", "tpl", "tmpl", "html", "env", "sql", "yaml"]
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  log = "build-errors.log"
  send_interrupt = true
  stop_on_error = true

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  time = false

[misc]
  clean_on_exit = true